<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #f0f0f0;
        --panel: #efefef;
        --line: #d0d0d0;
        --ink: #2b2b2b;
        --muted: #6f6f6f;
        --brand: #2f66d0;
        --brand-dark: #2452aa;
        --danger: #c63c3c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .wrap {
        padding: 14px;
      }

      .card {
        background: var(--panel);
        border-radius: 22px;
        border: 1px solid var(--line);
        min-height: 620px;
        padding: 14px;
        display: flex;
        flex-direction: column;
      }

      .head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      h1 {
        margin: 0;
        font-size: 39px;
        line-height: 1.08;
        letter-spacing: -0.7px;
        font-weight: 500;
      }

      .close {
        border: none;
        background: transparent;
        font-size: 34px;
        line-height: 1;
        color: #4f4f4f;
        cursor: pointer;
      }

      .subtitle {
        text-align: center;
        color: var(--ink);
        margin-top: 4px;
        margin-bottom: 12px;
        font-size: 28px;
      }

      .scroll {
        border-radius: 10px;
        max-height: 380px;
        overflow-y: auto;
        padding: 2px 8px 6px;
      }

      .section {
        margin-bottom: 14px;
      }

      .section-title {
        margin: 8px 4px 8px;
        color: var(--muted);
        font-size: 20px;
        font-weight: 600;
      }

      .section-note {
        margin: 2px 4px 8px;
        color: #7b7b7b;
        font-size: 12px;
      }

      .btn-stack {
        display: grid;
        gap: 8px;
      }

      .day-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      button.primary,
      button.day,
      button.secondary,
      button.toggle {
        border: none;
        border-radius: 8px;
        background: var(--brand);
        color: #fff;
        font-weight: 700;
        font-size: 15px;
        letter-spacing: 0.25px;
        padding: 10px 10px;
        cursor: pointer;
        box-shadow: 0 2px 5px rgba(26, 46, 82, 0.26);
      }

      button.primary:hover,
      button.day:hover,
      button.secondary:hover,
      button.toggle:hover {
        background: var(--brand-dark);
      }

      button.day.active {
        background: #1647a4;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .status {
        margin-top: 8px;
        min-height: 22px;
        font-size: 13px;
        color: var(--muted);
      }

      .status.error {
        color: var(--danger);
      }

      .results {
        margin-top: 8px;
        border-top: 1px solid #d4d4d4;
        padding-top: 8px;
      }

      .result-item {
        font-size: 13px;
        margin-bottom: 8px;
        padding: 8px;
        background: #fff;
        border-radius: 8px;
        border: 1px solid #e3e3e3;
      }

      .result-item a {
        color: #1953ba;
        text-decoration: none;
      }

      .result-item a:hover {
        text-decoration: underline;
      }

      .small {
        color: #666;
        font-size: 12px;
        margin-top: 4px;
      }

      .loading {
        display: none;
        margin-top: 8px;
        padding: 10px;
        border-radius: 8px;
        background: #ffffff;
        border: 1px solid #d9dee9;
      }

      .loading.active {
        display: block;
      }

      .loading-row {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #3d4b68;
        font-size: 13px;
      }

      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid #d2d9ec;
        border-top-color: #2f66d0;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .progress-track {
        position: relative;
        margin-top: 8px;
        height: 8px;
        width: 100%;
        border-radius: 999px;
        background: #e9edf7;
        overflow: hidden;
      }

      .progress-bar {
        position: absolute;
        top: 0;
        left: -35%;
        height: 100%;
        width: 35%;
        border-radius: 999px;
        background: linear-gradient(90deg, #2f66d0, #6b97ee);
        animation: progress-slide 1.1s ease-in-out infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes progress-slide {
        0% {
          left: -35%;
        }
        100% {
          left: 100%;
        }
      }

      @media (max-width: 450px) {
        h1 {
          font-size: 32px;
        }

        .subtitle {
          font-size: 22px;
        }

        .day-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="head">
          <h1>KRN Log Export Screen</h1>
          <button type="button" class="close" onclick="google.script.host.close()">&times;</button>
        </div>

        <div class="subtitle">Which days to export?</div>

        <div class="scroll">
          <div class="section">
            <div class="btn-stack">
              <button type="button" class="primary" onclick="runPreset('ALL_DAYS')">ALL DAYS</button>
              <button type="button" class="primary" onclick="runPreset('TUE_SAT')">TUE-SAT</button>
              <button type="button" class="primary" onclick="runPreset('WED_SAT')">WED-SAT</button>
              <button type="button" class="primary" onclick="runPreset('THU_SAT')">THU-SAT</button>
              <button type="button" class="primary" onclick="runPreset('FRI_SAT')">FRI &amp; SAT</button>
            </div>
          </div>

          <div class="section">
            <div class="section-title">Specific Days</div>
            <div class="section-note">Tap days to toggle, then export selected.</div>
            <div id="dayButtons" class="day-grid"></div>
            <div class="btn-stack" style="margin-top:8px;">
              <button type="button" class="toggle" onclick="clearSpecificDays()">CLEAR</button>
              <button type="button" class="secondary" onclick="runSpecificDays()">EXPORT SELECTED DAYS</button>
            </div>
          </div>
        </div>

        <div id="loading" class="loading" aria-live="polite">
          <div class="loading-row">
            <div class="spinner" aria-hidden="true"></div>
            <div id="loadingText">Generating ASC files...</div>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-bar"></div>
          </div>
        </div>

        <div id="status" class="status"></div>
        <div id="results" class="results"></div>
      </div>
    </div>

    <script>
      const dayOrder = ["MON", "TUE", "WED", "THU", "FRI", "SAT", "SUN"];
      const dayLabels = {};
      const availableDayTokens = new Set();
      const selectedSpecificDays = new Set();
      let isBusy = false;

      const statusEl = document.getElementById("status");
      const loadingEl = document.getElementById("loading");
      const loadingTextEl = document.getElementById("loadingText");
      const resultsEl = document.getElementById("results");
      const dayButtonsEl = document.getElementById("dayButtons");

      function setBusy(nextBusy) {
        isBusy = nextBusy;
        const controls = document.querySelectorAll("button");
        controls.forEach((el) => {
          el.disabled = nextBusy;
        });
        loadingEl.classList.toggle("active", nextBusy);
      }

      function setLoadingText(message) {
        loadingTextEl.textContent = message || "Working...";
      }

      function setStatus(message, isError) {
        statusEl.textContent = message || "";
        statusEl.className = isError ? "status error" : "status";
      }

      function escapeHtml(text) {
        return String(text || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function renderDayButtons() {
        dayButtonsEl.innerHTML = "";

        dayOrder.forEach((token) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "day";
          button.textContent = (dayLabels[token] || token).toUpperCase();

          if (!availableDayTokens.has(token)) {
            button.disabled = true;
            button.title = "No matching log sheets found for this day.";
          }

          button.addEventListener("click", () => {
            if (selectedSpecificDays.has(token)) {
              selectedSpecificDays.delete(token);
            } else {
              selectedSpecificDays.add(token);
            }
            syncDayButtonStates();
          });

          dayButtonsEl.appendChild(button);
        });

        syncDayButtonStates();
      }

      function syncDayButtonStates() {
        const buttons = dayButtonsEl.querySelectorAll("button.day");
        buttons.forEach((button, index) => {
          const token = dayOrder[index];
          button.classList.toggle("active", selectedSpecificDays.has(token));
        });
      }

      function renderResults(result) {
        if (!result || !result.files || result.files.length === 0) {
          resultsEl.innerHTML = "";
          return;
        }

        const html = result.files
          .map((file) => {
            const day = escapeHtml(file.dayLabel || file.dayToken);
            const fileName = escapeHtml(file.fileName);
            const url = escapeHtml(file.downloadUrl);
            const sheets = (file.sheetNames || []).map(escapeHtml).join(", ");
            const lineCount = Number(file.lineCount || 0);

            return (
              '<div class="result-item">' +
              '<div><strong>' +
              day +
              "</strong> - " +
              '<a href="' +
              url +
              '" target="_blank">' +
              fileName +
              "</a></div>" +
              '<div class="small">Rows: ' +
              lineCount +
              " | Sheets: " +
              sheets +
              "</div>" +
              "</div>"
            );
          })
          .join("");

        resultsEl.innerHTML = html;
      }

      function onExportSuccess(result) {
        setBusy(false);
        setStatus(result && result.message ? result.message : "Export complete.", false);
        renderResults(result);
      }

      function onExportError(error) {
        setBusy(false);
        const message = error && error.message ? error.message : "Export failed.";
        setStatus(message, true);
      }

      function runPreset(preset) {
        if (isBusy) return;
        setBusy(true);
        setLoadingText("Generating ASC files...");
        setStatus("Generating ASC files...", false);
        resultsEl.innerHTML = "";

        google.script.run
          .withSuccessHandler(onExportSuccess)
          .withFailureHandler(onExportError)
          .exportAscForPreset(preset);
      }

      function runSpecificDays() {
        if (isBusy) return;

        const dayTokens = dayOrder.filter((token) => selectedSpecificDays.has(token));
        if (dayTokens.length === 0) {
          setStatus("Choose at least one day.", true);
          return;
        }

        setBusy(true);
        setLoadingText("Generating ASC files...");
        setStatus("Generating ASC files...", false);
        resultsEl.innerHTML = "";

        google.script.run
          .withSuccessHandler(onExportSuccess)
          .withFailureHandler(onExportError)
          .exportAscForSpecificDays(dayTokens);
      }

      function clearSpecificDays() {
        selectedSpecificDays.clear();
        syncDayButtonStates();
      }

      function initDialog(state) {
        const labels = state && state.dayLabels ? state.dayLabels : {};
        Object.keys(labels).forEach((key) => {
          dayLabels[key] = labels[key];
        });

        const available = state && state.availableDayTokens ? state.availableDayTokens : [];
        available.forEach((token) => {
          availableDayTokens.add(token);
        });

        renderDayButtons();
        if (available.length === 0) {
          setStatus("No exportable KIN/KAN log sheets were found.", true);
        } else {
          setStatus("Choose a preset or specific days.", false);
        }
      }

      function init() {
        setBusy(true);
        setLoadingText("Loading export options...");
        setStatus("Loading export options...", false);

        google.script.run
          .withSuccessHandler((state) => {
            setBusy(false);
            initDialog(state);
          })
          .withFailureHandler((error) => {
            setBusy(false);
            onExportError(error);
          })
          .getAscExportDialogState();
      }

      init();
    </script>
  </body>
</html>
